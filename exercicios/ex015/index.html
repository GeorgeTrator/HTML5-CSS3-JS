<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador</title>

    <style>
        body {
            background-color: rgb(45, 91, 113);
        }
        div {
            width: 500px;
            height: 500px;
            margin: 150px auto;
            background-color: bisque;
            border-radius: 10px;
            padding: 50px;
        }
        h1{
            color: rgb(97, 108, 53);
            text-align: center;
            font-family: 'Arial', Times, serif;
        }
        p{
            display: inline-block;  
            padding: 10px;
            margin-right: 5px;
            background-color: lightgray;
            border: 1px solid #ccc;
            border-radius: 10px;
        }

    </style>

</head>
<body>
    <div>
        <h1>Contador</h1>
        <p>0</p>
        <button>+</button>
    </div>
    
    <script>
        const btn = document.querySelector("button")
        let p = document.querySelector("p")
        let contador = 0;

        btn.onclick = function () {
            contador = contador + 1; // Ou contador++
            p.innerText = contador
        }

    </script>

</body>
</html>
