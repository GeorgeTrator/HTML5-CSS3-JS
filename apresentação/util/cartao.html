<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Card</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #e5e5e5;
    }

    .card {
        width: 320px;
        padding: 30px 20px 25px;
        border-radius: 16px;
        background: linear-gradient(to bottom, #f0f0f0 0%, #ffffff 60%);
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        text-align: center;
        position: relative;
    }

    .profile-img {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        overflow: hidden;
        margin: -70px auto 15px;
        border: 6px solid white;
        box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        background: #ddd;
    }

    .profile-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .name {
        font-size: 22px;
        font-weight: bold;
        color: #1f2a44;
        margin-bottom: 8px;
    }

    .description {
        font-size: 14px;
        color: #777;
        line-height: 1.4;
        margin-bottom: 20px;
    }

    .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 25px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(135deg, #4a90e2, #2c5fb8);
        color: white;
        font-size: 14px;
        cursor: pointer;
        box-shadow: 0 6px 12px rgba(44, 95, 184, 0.3);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 18px rgba(44, 95, 184, 0.35);
    }

    .icon {
        font-size: 16px;
    }
</style>
</head>

<body>

<div class="card">
    <div class="profile-img">
        <img src="../imagens/george.jpg" alt="Profile">
    </div>

    <div class="name">George Santos</div>

    <div class="description">
        Professor | Pesquisador |<br>
        Compartilhando conhecimento e experiências.
    </div>

    <button class="button">
        <span class="icon">👤+</span>
        Follow
    </button>
</div>

</body>
</html>
