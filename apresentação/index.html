<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentação de Desenvolvimento Web</title>
    
    <!-- Reveal.js CSS (via CDN) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/reveal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/theme/black.css">
    
    <!-- Estilos customizados -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="reveal">
        <div class="slides">
            <!-- Slide 1 - Início -->
            <section>
                <h1>Desenvolvimento Web com HTML5, CSS3 e JavaScript</h1>
                <p>Use as setas do teclado para navegar</p>
            </section>

            <!-- Slide 2 -->
            <section>
                <div class="ImageSlide">
                    <img id="IntroBoxModel" src="imagens/box-model/modelo de caixas.png" alt="Capa da apresentação modelo de caixas">
                </div>
            </section>

            <section>
                <section>
                    <h1 id="h1Slide3">Tudo em HTML5 é uma caixa!</h1>
                    <div class="ImageSlide">
                        <a href="util/box-model/cartao.html" target="_blank">
                        <img id="GeorgeCartao"src="imagens/box-model/georgeCartao.jpeg" alt="Div cartão George Santos">
                        </a>
                    </div>
                </section>
                <section>
                    <div class="ImageSlide">
                        <img id="BoxModelGeorgeCartao" src="imagens/box-model/box-model-georgeCartao.jpeg" alt="Elementos de caixa ao redor da imagem cartão George Santos">
                    </div>
                </section>
            </section>
            
        </div>
    </div>

    <!-- Reveal.js script (via CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/reveal.js"></script>
    <script src="script.js"></script>
</body>
</html>
